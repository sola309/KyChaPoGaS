<!DOCTYPE html>

<style>
/*FONTS*/
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1920px; height:1080px; overflow:hidden; background:#fff; }
#stage { position:absolute; width:1920px; height:1080px; overflow:hidden;
         transform-origin:0 0; font-family:'MPR','Noto Sans CJK JP',sans-serif; }
.scene { position:absolute; inset:0; display:none; overflow:hidden; }
img { display:block; }
.outline-pink { text-shadow: 3px 3px 0 #fff, -3px 3px 0 #fff, 3px -3px 0 #fff, -3px -3px 0 #fff,
  0 4px 0 #fff, 0 -4px 0 #fff, 4px 0 0 #fff, -4px 0 0 #fff, 0 10px 22px rgba(160,40,70,.35); }
#flash { position:absolute; inset:0; background:#fff; opacity:0; z-index:90; }
#letterbox-top, #letterbox-bot { position:absolute; left:0; width:100%; height:0; background:#f2b9c4; z-index:80; }
#letterbox-top { top:0; } #letterbox-bot { bottom:0; }
#iris { position:absolute; inset:0; z-index:95; pointer-events:none; }
</style>
</head>

<div id="stage">
  <div id="scenes"></div>
  <div id="bands"></div>
  <div id="letterbox-top"></div><div id="letterbox-bot"></div>

  <div id="iris"></div>
